services:
  postgres:
    image: postgres:16-alpine
    container_name: mockloop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mockloop
      POSTGRES_PASSWORD: mockloop_dev
      POSTGRES_DB: mockloop
    ports:
      - "5432:5432"
    volumes:
      - mockloop_pgdata:/var/lib/postgresql/data

volumes:
  mockloop_pgdata:
